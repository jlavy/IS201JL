<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tic Tac Toe vs AI</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    h1 {
        color: white;
        text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        margin-bottom: 10px;
    }

    #status {
        margin-bottom: 10px;
        font-size: 1.2rem;
        font-weight: bold;
        color: white;
    }

    select {
        padding: 8px;
        border-radius: 10px;
        border: none;
        margin-bottom: 15px;
        font-size: 1rem;
        cursor: pointer;
    }

    .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 8px;
    }

    .cell {
        width: 100px;
        height: 100px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        cursor: pointer;
        border-radius: 15px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        transition: 0.2s;
        user-select: none;
    }

    .cell:hover {
        transform: scale(1.05);
        background: #ffe4ec;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 1rem;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #ff4f81;
        color: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button:hover {
        background: #ff2e6f;
    }
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<select id="difficulty">
    <option value="easy">Easy 😊</option>
    <option value="medium" selected>Medium 😐</option>
    <option value="hard">Hard 😈</option>
</select>

<div id="status">Your turn (X)</div>

<div class="board" id="board"></div>

<button onclick="resetGame()">Restart Game</button>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");
const difficultySelect = document.getElementById("difficulty");

let human = "X";
let ai = "O";
let currentBoard = Array(9).fill("");
let gameActive = true;

const winCombos = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

function createBoard() {
    board.innerHTML = "";
    currentBoard.forEach((_, i) => {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.dataset.index = i;
        cell.addEventListener("click", playerMove);
        board.appendChild(cell);
    });
}

function playerMove(e) {
    const i = e.target.dataset.index;

    if (!gameActive || currentBoard[i] !== "") return;

    makeMove(i, human);

    if (checkGameEnd()) return;

    statusText.textContent = "Computer thinking...";

    setTimeout(() => {
        const difficulty = difficultySelect.value;
        const move = getAIMove(difficulty);
        makeMove(move, ai);
        checkGameEnd();
    }, 300);
}

function makeMove(index, player) {
    currentBoard[index] = player;
    document.querySelectorAll(".cell")[index].textContent = player;
}

function getAIMove(level) {
    const available = currentBoard
        .map((v,i) => v === "" ? i : null)
        .filter(v => v !== null);

    if (level === "easy") {
        return available[Math.floor(Math.random() * available.length)];
    }

    if (level === "medium") {
        // 50% smart, 50% random
        if (Math.random() < 0.5) {
            return available[Math.floor(Math.random() * available.length)];
        } else {
            return minimax(currentBoard, ai).index;
        }
    }

    // hard
    return minimax(currentBoard, ai).index;
}

function checkWinner(board, player) {
    return winCombos.some(combo =>
        combo.every(i => board[i] === player)
    );
}

function checkGameEnd() {
    if (checkWinner(currentBoard, human)) {
        statusText.textContent = "You win! 🎉";
        gameActive = false;
        return true;
    }

    if (checkWinner(currentBoard, ai)) {
        statusText.textContent = "Computer wins 🤖";
        gameActive = false;
        return true;
    }

    if (!currentBoard.includes("")) {
        statusText.textContent = "Draw!";
        gameActive = false;
        return true;
    }

    statusText.textContent = "Your turn (X)";
    return false;
}

// Minimax (used for hard mode)
function minimax(newBoard, player) {
    const availSpots = newBoard
        .map((v,i) => v === "" ? i : null)
        .filter(v => v !== null);

    if (checkWinner(newBoard, human)) return { score: -10 };
    if (checkWinner(newBoard, ai)) return { score: 10 };
    if (availSpots.length === 0) return { score: 0 };

    let moves = [];

    for (let i of availSpots) {
        let move = {};
        move.index = i;
        newBoard[i] = player;

        if (player === ai) {
            move.score = minimax(newBoard, human).score;
        } else {
            move.score = minimax(newBoard, ai).score;
        }

        newBoard[i] = "";
        moves.push(move);
    }

    let bestMove;

    if (player === ai) {
        let bestScore = -Infinity;
        for (let m of moves) {
            if (m.score > bestScore) {
                bestScore = m.score;
                bestMove = m;
            }
        }
    } else {
        let bestScore = Infinity;
        for (let m of moves) {
            if (m.score < bestScore) {
                bestScore = m.score;
                bestMove = m;
            }
        }
    }

    return bestMove;
}

function resetGame() {
    currentBoard = Array(9).fill("");
    gameActive = true;
    statusText.textContent = "Your turn (X)";
    createBoard();
}

createBoard();
</script>

</body>
</html>
